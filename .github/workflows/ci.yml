name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Lint & unit tests on Linux (fastest, cheapest)
  lint:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm run audit

      - name: Run checks (typecheck, lint, format, unit tests)
        run: npm run check

  # Step 2: E2E on Linux (1x cost)
  e2e-linux:
    name: E2E (Linux)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify CLI binary
        run: |
          chmod +x ./bin/orkify
          ./bin/orkify --version
          ./bin/orkify --help

      - name: Run E2E tests
        run: npm run test:e2e

  # Step 3: E2E on Windows (2x cost)
  e2e-windows:
    name: E2E (Windows)
    runs-on: windows-latest
    needs: e2e-linux
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify CLI binary
        run: |
          node ./bin/orkify --version
          node ./bin/orkify --help

      - name: Run E2E tests
        run: npm run test:e2e

  # Step 4: E2E on macOS (10x cost)
  e2e-macos:
    name: E2E (macOS)
    runs-on: macos-latest
    needs: e2e-windows
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify CLI binary
        run: |
          chmod +x ./bin/orkify
          ./bin/orkify --version
          ./bin/orkify --help

      - name: Run E2E tests
        run: npm run test:e2e
