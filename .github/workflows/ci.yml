name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Lint, unit tests, and E2E on Linux (single runner, single npm ci)
  linux:
    name: Lint, Unit & E2E (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm run audit

      - name: Run checks (typecheck, lint, format, unit tests)
        run: npm run check

      - name: Build
        run: npm run build

      - name: Verify CLI binary
        run: |
          chmod +x ./bin/orkify
          ./bin/orkify --version
          ./bin/orkify --help

      - name: Run E2E tests
        run: npm run test:e2e

  # E2E on Windows and macOS (run in parallel with Linux — free for public repos)
  e2e-windows:
    name: E2E (Windows)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify CLI binary
        run: |
          node ./bin/orkify --version
          node ./bin/orkify --help

      - name: Run E2E tests
        run: npm run test:e2e

  e2e-macos:
    name: E2E (macOS)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify CLI binary
        run: |
          chmod +x ./bin/orkify
          ./bin/orkify --version
          ./bin/orkify --help

      - name: Run E2E tests
        run: npm run test:e2e
